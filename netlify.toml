[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'Sin build step: sitio estático + functions'"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/lib/**"]

[functions."generate-exam"]
  timeout = 26

[functions."extract-topics"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
